<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Golden Eagle Mart Kapyubei</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Poppins', sans-serif; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            background: linear-gradient(135deg, #D4AF37, #B8860B); 
            padding: 20px; 
        }
        .login-box { 
            background: white; 
            border-radius: 20px; 
            padding: 40px; 
            width: 100%; 
            max-width: 440px; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.3); 
        }
        .login-header { text-align: center; margin-bottom: 25px; }
        .login-header h1 { 
            font-size: 22px; 
            color: #1F2937; 
        }
        .login-header h1 i { 
            color: #D4AF37; 
            margin-right: 8px; 
        }
        .login-header p { color: #6B7280; font-size: 13px; margin-top: 5px; }
        
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 12px; color: #374151; }
        .form-group input { 
            width: 100%; 
            padding: 12px 16px; 
            border: 2px solid #E5E7EB; 
            border-radius: 10px; 
            font-size: 14px; 
            font-family: 'Poppins', sans-serif; 
            outline: none; 
        }
        .form-group input:focus { border-color: #D4AF37; }
        
        .pass-wrapper { position: relative; }
        .pass-wrapper input { 
            width: 100%; 
            padding: 12px 55px 12px 16px !important; 
            border: 2px solid #E5E7EB; 
            border-radius: 10px; 
            font-size: 14px; 
            font-family: 'Poppins', sans-serif; 
            outline: none; 
        }
        .pass-wrapper input:focus { border-color: #D4AF37; }
        .pass-toggle { 
            position: absolute; 
            right: 5px; 
            top: 50%; 
            transform: translateY(-50%); 
            background: #F3F4F6; 
            border: 1px solid #D1D5DB; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 11px; 
            padding: 6px 10px; 
            font-family: 'Poppins', sans-serif; 
            color: #374151; 
            font-weight: 500; 
        }
        .pass-toggle:hover { background: #E5E7EB; }
        
        .error-msg { 
            background: #FEE2E2; 
            color: #991B1B; 
            padding: 10px 14px; 
            border-radius: 8px; 
            font-size: 12px; 
            margin-bottom: 15px; 
            display: none; 
        }
        .error-msg.show { display: block; }
        
        .success-msg { 
            background: #D1FAE5; 
            color: #065F46; 
            padding: 10px 14px; 
            border-radius: 8px; 
            font-size: 12px; 
            margin-bottom: 15px; 
            display: none; 
        }
        .success-msg.show { display: block; }
        
        .btn-login { 
            width: 100%; 
            padding: 14px; 
            background: #D4AF37; 
            color: #1F2937; 
            border: none; 
            border-radius: 10px; 
            font-size: 16px; 
            font-weight: 600; 
            cursor: pointer; 
            font-family: 'Poppins', sans-serif; 
        }
        .btn-login:hover { background: #B8860B; color: white; }
        .btn-login:disabled { opacity: 0.7; cursor: not-allowed; }
        
        .login-footer { text-align: center; margin-top: 20px; }
        .login-footer a { 
            color: white; 
            text-decoration: none; 
            font-size: 14px; 
            font-weight: 500; 
            background: rgba(255,255,255,0.2); 
            padding: 10px 20px; 
            border-radius: 25px; 
            display: inline-block; 
        }
        .login-footer a:hover { background: rgba(255,255,255,0.3); }
        
        .step { display: none; }
        .step.active { display: block; }
        
        .code-note { 
            background: #FEF3C7; 
            border: 1px solid #FDE68A; 
            padding: 12px; 
            text-align: center; 
            border-radius: 10px; 
            margin: 15px 0; 
            font-size: 12px; 
            color: #B45309; 
        }
        .code-note.dev { 
            background: #FEF3C7; 
            color: #B45309; 
            border-color: #FCD34D; 
        }
        
        .resend-link { 
            color: #D4AF37; 
            cursor: pointer; 
            font-size: 12px; 
            text-decoration: underline; 
        }
        .resend-link:hover { color: #B8860B; }
        
        .spinner { 
            display: none; 
            width: 20px; 
            height: 20px; 
            border: 3px solid rgba(0,0,0,0.1); 
            border-top-color: #1F2937; 
            border-radius: 50%; 
            animation: spin 0.6s linear infinite; 
            margin: 0 auto; 
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .btn-login.loading .btn-text { display: none; }
        .btn-login.loading .spinner { display: block; }
        
        .back-link { 
            color: #6B7280; 
            font-size: 12px; 
            text-decoration: none; 
            display: inline-block; 
            margin-top: 10px; 
        }
        .back-link:hover { color: #D4AF37; }
        
        .eagle-icon {
            font-size: 50px;
            color: #D4AF37;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="login-header">
            <div class="eagle-icon">🦅</div>
            <h1><i class="fas fa-crown"></i> Golden Eagle Admin</h1>
            <p>Kapyubei Store Manager Login</p>
        </div>
        <div class="error-msg" id="errorMsg"></div>
        <div class="success-msg" id="successMsg"></div>

        <!-- Step 1: Username & Password -->
        <div class="step active" id="step1">
            <form id="loginForm">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Username</label>
                    <input type="text" id="username" placeholder="Enter username" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <div class="pass-wrapper">
                        <input type="password" id="password" placeholder="Enter password" required>
                        <button type="button" class="pass-toggle" onclick="togglePassword()">Show</button>
                    </div>
                </div>
                <button type="submit" class="btn-login" id="btnStep1">
                    <span class="btn-text">Continue <i class="fas fa-arrow-right"></i></span>
                    <div class="spinner"></div>
                </button>
            </form>
        </div>

        <!-- Step 2: 2FA Code -->
        <div class="step" id="step2">
            <p style="text-align:center;font-size:14px;margin-bottom:5px;"><i class="fas fa-shield-alt"></i> Verification Required</p>
            <p style="text-align:center;font-size:12px;color:#6B7280;margin-bottom:15px;">Enter the verification code below</p>
            <div class="code-note" id="codeNote">Sending code...</div>
            <form id="verifyForm">
                <div class="form-group">
                    <label><i class="fas fa-key"></i> Enter 6-Digit Code</label>
                    <input type="text" id="verifyCode" placeholder="000000" maxlength="6" required>
                </div>
                <button type="submit" class="btn-login" id="btnStep2">
                    <span class="btn-text">Verify & Login <i class="fas fa-sign-in-alt"></i></span>
                    <div class="spinner"></div>
                </button>
            </form>
            <p style="text-align:center;margin-top:12px;">
                <span class="resend-link" onclick="sendVerificationCode()"><i class="fas fa-redo"></i> Resend Code</span>
            </p>
            <p style="text-align:center;margin-top:5px;">
                <a href="#" onclick="goBackToLogin()" class="back-link"><i class="fas fa-arrow-left"></i> Back to login</a>
            </p>
        </div>
    </div>
    <div class="login-footer">
        <a href="index.html"><i class="fas fa-store"></i> Back to Golden Eagle Mart</a>
    </div>

    <script>
        // Admin credentials
        const ADMIN_USERNAME = 'admin';
        const ADMIN_PASSWORD = 'admin123';
        
        let currentCode = '';
        let codeExpiry = 0;
        
        // Toggle password visibility
        function togglePassword() {
            const p = document.getElementById('password');
            const btn = event.target;
            if (p.type === 'password') {
                p.type = 'text';
                btn.textContent = 'Hide';
            } else {
                p.type = 'password';
                btn.textContent = 'Show';
            }
        }
        
        // Generate random 6-digit code
        function generateCode() {
            return Math.floor(100000 + Math.random() * 900000).toString();
        }
        
        // Handle login form submission
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            const btn = document.getElementById('btnStep1');
            
            btn.classList.add('loading');
            
            setTimeout(function() {
                if (username === ADMIN_USERNAME && password === ADMIN_PASSWORD) {
                    errorMsg.classList.remove('show');
                    showStep2();
                    sendVerificationCode();
                } else {
                    errorMsg.textContent = '❌ Invalid username or password.';
                    errorMsg.classList.add('show');
                }
                btn.classList.remove('loading');
            }, 500);
        });
        
        // Show step 2 (verification)
        function showStep2() {
            document.getElementById('step1').classList.remove('active');
            document.getElementById('step2').classList.add('active');
            document.getElementById('errorMsg').classList.remove('show');
        }
        
        // Send verification code (demo mode - shows on screen)
        function sendVerificationCode() {
            currentCode = generateCode();
            codeExpiry = Date.now() + 300000; // 5 minutes
            
            const note = document.getElementById('codeNote');
            note.innerHTML = `
                <i class="fas fa-envelope"></i> <strong>DEMO MODE - Your Code</strong><br>
                <span style="font-size: 32px; font-weight: 700; color: #D4AF37; letter-spacing: 5px;">${currentCode}</span><br>
                <small>Enter this code to login</small>
                <hr style="margin: 8px 0;">
                <small>In production, this code would be emailed to you</small>
            `;
            note.className = 'code-note dev';
            
            console.log('Verification code:', currentCode);
        }
        
        // Handle verification form submission
        document.getElementById('verifyForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const entered = document.getElementById('verifyCode').value.trim();
            const errorMsg = document.getElementById('errorMsg');
            const successMsg = document.getElementById('successMsg');
            const btn = document.getElementById('btnStep2');
            
            btn.classList.add('loading');
            
            setTimeout(function() {
                if (Date.now() > codeExpiry) {
                    errorMsg.textContent = '❌ Code expired. Please request a new code.';
                    errorMsg.classList.add('show');
                    btn.classList.remove('loading');
                    return;
                }
                
                if (entered === currentCode) {
                    errorMsg.classList.remove('show');
                    successMsg.textContent = '✅ Login successful! Redirecting...';
                    successMsg.classList.add('show');
                    
                    // Store login session
                    localStorage.setItem('goldenEagle_adminLoggedIn', 'true');
                    localStorage.setItem('goldenEagle_adminName', 'Admin');
                    localStorage.setItem('goldenEagle_adminExpiry', (Date.now() + 86400000).toString());
                    
                    setTimeout(function() {
                        window.location.href = 'admin.html';
                    }, 1000);
                } else {
                    errorMsg.textContent = '❌ Invalid verification code. Please try again.';
                    errorMsg.classList.add('show');
                    document.getElementById('verifyCode').value = '';
                    btn.classList.remove('loading');
                }
            }, 500);
        });
        
        // Go back to login step
        function goBackToLogin() {
            document.getElementById('step2').classList.remove('active');
            document.getElementById('step1').classList.add('active');
            document.getElementById('errorMsg').classList.remove('show');
            document.getElementById('successMsg').classList.remove('show');
            document.getElementById('verifyCode').value = '';
        }
        
        // Check if already logged in
        if (localStorage.getItem('goldenEagle_adminLoggedIn') && 
            Date.now() < parseInt(localStorage.getItem('goldenEagle_adminExpiry') || 0)) {
            window.location.href = 'admin.html';
        }
        
        console.log('Golden Eagle Mart Login Ready! 🦅');
        console.log('Username: admin');
        console.log('Password: admin123');
    </script>
</body>
</html>
